<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="dashboard.css">
    <title>Dashboard</title>
</head>

<body>
    <section id="menu-lateral">
        <div id="logo">
            <img src="../assets/eduplace.png" alt="">
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-bars"></i>
            <p>Dashboard</p>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-book-open"></i>
            <p>Meus Cursos</p>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-medal"></i>
            <p>Certificados</p>
        </div>
        <div class="box-icon">
            <i class="fa-regular fa-heart"></i>
            <p>Favoritos</p>
        </div>
        <div class="box-icon">
            <i class="fa-regular fa-clock"></i>
            <p>Histórico</p>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-user"></i>
            <p>Perfil</p>
        </div>
        <div class="box-icon">
            <i class="fa-solid fa-gear"></i>
            <p>Configurações</p>
        </div>

        <div id="box-hr">
            <hr>
        </div>

        <div class="box-icon">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <p>Sair</p>
        </div>

    </section>
    <section>
        <div id="cabecalho">
            <div>               
            </div>
            <div id="box-search">
                <div id="box-input">
                    <input type="text"
                    placeholder="Buscar Cursos...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <div id="box-avatar">
                    <i class="fa-regular fa-bell"></i>
                    <img src="../assets/avatar.png" alt="">
                </div>
            </div>
        </div>
        <div id="regresso">
            <div class="cartao"> 
                <div class="text-icone">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <div class="text">
                    <strong>12</strong>
                    <p>Cursos Matriculados</p>
                    <a href="">Ver todos</a>   
                </div>
            </div>
            <div class="cartao">  
                <div class="text-icone">
                    <i class="fa-solid fa-play"></i>
                </div>
                <div class="text">
                    <strong>12</strong>
                    <p>Em andamento</p>
                    <a href="">Ver todos</a>      
                </div>
            </div>
            <div class="cartao"> 
                <div class="text-icone">
                    <i class="fa-solid fa-trophy"></i>
                </div>
                <div class="text">
                    <strong>12</strong>
                    <p>Conquistas</p>
                    <a href="">Ver todas</a>                                       
                </div>                 
            </div>
            <div class="cartao">
                <div class="text-icone">
                    <i class="fa-regular fa-clock"></i>
                </div>
                <div class="text">
                    <strong>12</strong>
                    <p>Carga Horária</p>
                    <a href="">Ver horário</a>                       
                </div>
            </div>
        </div>


    </section>
</body>

</html>
